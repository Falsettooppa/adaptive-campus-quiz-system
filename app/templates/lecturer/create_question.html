<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Question</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/output.css') }}">
</head>
<body class="bg-slate-100 min-h-screen">
  <div class="max-w-4xl mx-auto px-6 py-10">
    {% include 'partials/flash.html' %}

    <div class="bg-white rounded-2xl shadow-xl p-8">
      <div class="flex items-center justify-between mb-6">
        <h1 class="text-2xl font-bold text-slate-800">Add Question</h1>
        <a href="{{ url_for('main.lecturer_dashboard') }}" class="text-blue-600 hover:underline">Back</a>
      </div>

      {% if courses %}
        <form method="POST" class="space-y-5">
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">Course</label>
            <select name="course_id" class="w-full border border-slate-300 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500">
              <option value="">Select a course</option>
              {% for course in courses %}
                <option value="{{ course.id }}">{{ course.course_code }} - {{ course.course_title }}</option>
              {% endfor %}
            </select>
          </div>

          <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
            <div>
              <label class="block text-sm font-medium text-slate-700 mb-1">Topic</label>
              <input type="text" name="topic" class="w-full border border-slate-300 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <div>
              <label class="block text-sm font-medium text-slate-700 mb-1">Difficulty Level</label>
              <select name="difficulty_level" class="w-full border border-slate-300 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500">
                <option value="">Select difficulty</option>
                <option value="easy">Easy</option>
                <option value="medium">Medium</option>
                <option value="hard">Hard</option>
              </select>
            </div>
          </div>

          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">Question Text</label>
            <textarea name="question_text" rows="4" class="w-full border border-slate-300 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>
          </div>

          <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
            <div>
              <label class="block text-sm font-medium text-slate-700 mb-1">Option A</label>
              <input type="text" name="option_a" class="w-full border border-slate-300 rounded-xl px-4 py-3">
            </div>
            <div>
              <label class="block text-sm font-medium text-slate-700 mb-1">Option B</label>
              <input type="text" name="option_b" class="w-full border border-slate-300 rounded-xl px-4 py-3">
            </div>
            <div>
              <label class="block text-sm font-medium text-slate-700 mb-1">Option C</label>
              <input type="text" name="option_c" class="w-full border border-slate-300 rounded-xl px-4 py-3">
            </div>
            <div>
              <label class="block text-sm font-medium text-slate-700 mb-1">Option D</label>
              <input type="text" name="option_d" class="w-full border border-slate-300 rounded-xl px-4 py-3">
            </div>
          </div>

          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">Correct Option</label>
            <select name="correct_option" class="w-full border border-slate-300 rounded-xl px-4 py-3">
              <option value="">Select correct option</option>
              <option value="A">A</option>
              <option value="B">B</option>
              <option value="C">C</option>
              <option value="D">D</option>
            </select>
          </div>

          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">Explanation</label>
            <textarea name="explanation" rows="3" class="w-full border border-slate-300 rounded-xl px-4 py-3"></textarea>
          </div>

          <button type="submit" class="w-full bg-blue-600 text-white py-3 rounded-xl hover:bg-blue-700">
            Save Question
          </button>
        </form>
      {% else %}
        <div class="bg-amber-50 text-amber-700 rounded-xl p-4">
          You need to create a course first before adding questions.
        </div>
      {% endif %}
    </div>
  </div>
</body>
</html>
