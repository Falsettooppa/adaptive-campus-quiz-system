<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/output.css') }}">
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center px-4">
  <div class="w-full max-w-lg bg-white rounded-2xl shadow-xl p-8">
    <h2 class="text-2xl font-bold text-slate-800 mb-6">Login</h2>

    {% include 'partials/flash.html' %}

    <form method="POST" class="space-y-5">
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Email</label>
        <input type="email" name="email" class="w-full border border-slate-300 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>

      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Password</label>
        <input type="password" name="password" class="w-full border border-slate-300 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>
      <div class="text-right">
  <a href="{{ url_for('auth.forgot_password') }}" class="text-sm text-blue-600 hover:underline">
    Forgot password?
  </a>
</div>

      <button type="submit" class="w-full bg-blue-600 text-white py-3 rounded-xl hover:bg-blue-700">
        Login
      </button>

      <p class="text-sm text-slate-600 text-center">
        Don’t have an account?
        <a href="{{ url_for('auth.register') }}" class="text-blue-600 hover:underline">Register</a>
      </p>
    </form>
  </div>
</body>
</html>
