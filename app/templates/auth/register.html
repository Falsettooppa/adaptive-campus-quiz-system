<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/output.css') }}">
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center px-4">
  <div class="w-full max-w-lg bg-white rounded-2xl shadow-xl p-8">
    <h2 class="text-2xl font-bold text-slate-800 mb-6">Student Registration</h2>

    {% include 'partials/flash.html' %}

    <form method="POST" class="space-y-5">
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Full Name</label>
        <input type="text" name="full_name" class="w-full border border-slate-300 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>

      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Matric Number</label>
        <input type="text" name="matric_number" class="w-full border border-slate-300 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>

      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Institutional Email</label>
        <input type="email" name="email" class="w-full border border-slate-300 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>

      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Password</label>
        <input type="password" name="password" class="w-full border border-slate-300 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>

      <button type="submit" class="w-full bg-slate-900 text-white py-3 rounded-xl hover:bg-slate-800">
        Register
      </button>

      <p class="text-sm text-slate-600 text-center">
        Already have an account?
        <a href="{{ url_for('auth.login') }}" class="text-blue-600 hover:underline">Login</a>
      </p>
    </form>
  </div>
</body>
</html>
