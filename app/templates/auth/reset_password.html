{% extends "base.html" %}

{% block title %}Reset Password{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto bg-white rounded-2xl shadow-xl p-8">
  <h1 class="text-2xl font-bold text-slate-800 mb-2">Reset Password</h1>
  <p class="text-slate-600 mb-6">
    Enter your new password below.
  </p>

  <form method="POST" class="space-y-5">
    <div>
      <label class="block text-sm font-medium text-slate-700 mb-1">New Password</label>
      <input type="password" name="password" required
             class="w-full border border-slate-300 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500">
    </div>

    <div>
      <label class="block text-sm font-medium text-slate-700 mb-1">Confirm Password</label>
      <input type="password" name="confirm_password" required
             class="w-full border border-slate-300 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500">
    </div>

    <button type="submit" class="w-full bg-slate-900 text-white py-3 rounded-xl hover:bg-slate-800">
      Reset Password
    </button>
  </form>
</div>
{% endblock %}
