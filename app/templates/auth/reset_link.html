{% extends "base.html" %}

{% block title %}Reset Link{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto bg-white rounded-2xl shadow-xl p-8">
  <h1 class="text-2xl font-bold text-slate-800 mb-4">Password Reset Link</h1>

  <p class="text-slate-600 mb-4">
    Use the link below to reset your password.
  </p>

  <div class="bg-slate-100 border border-slate-200 rounded-xl p-4 break-all text-sm text-slate-700">
    {{ reset_link }}
  </div>

  <a href="{{ reset_link }}"
     class="inline-block mt-6 bg-blue-600 text-white px-5 py-3 rounded-xl hover:bg-blue-700">
    Open Reset Page
  </a>
</div>
{% endblock %}
