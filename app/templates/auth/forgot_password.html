{% extends "base.html" %}

{% block title %}Forgot Password{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto bg-white rounded-2xl shadow-xl p-8">
  <h1 class="text-2xl font-bold text-slate-800 mb-2">Forgot Password</h1>
  <p class="text-slate-600 mb-6">
    Enter your email address to generate a password reset link.
  </p>

  <form method="POST" class="space-y-5">
    <div>
      <label class="block text-sm font-medium text-slate-700 mb-1">Email Address</label>
      <input type="email" name="email" required
             class="w-full border border-slate-300 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500">
    </div>

    <button type="submit" class="w-full bg-blue-600 text-white py-3 rounded-xl hover:bg-blue-700">
      Generate Reset Link
    </button>

    <p class="text-sm text-center text-slate-600">
      Remember your password?
      <a href="{{ url_for('auth.login') }}" class="text-blue-600 hover:underline">Login</a>
    </p>
  </form>
</div>
{% endblock %}
