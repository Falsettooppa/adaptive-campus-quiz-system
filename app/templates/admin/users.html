<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Manage Users</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/output.css') }}">
</head>
<body class="bg-slate-100 min-h-screen">
  <div class="max-w-7xl mx-auto px-6 py-10">
    {% include 'partials/flash.html' %}

    <div class="bg-white rounded-2xl shadow-xl p-8">
      <div class="flex items-center justify-between mb-6">
        <h1 class="text-2xl font-bold text-slate-800">Manage Users</h1>
        <a href="{{ url_for('main.admin_dashboard') }}" class="text-blue-600 hover:underline">Back</a>
      </div>

      <div class="overflow-x-auto">
        <table class="min-w-full bg-white border border-slate-200 rounded-xl overflow-hidden">
          <thead class="bg-slate-100">
            <tr>
              <th class="px-4 py-3 text-left text-sm font-semibold text-slate-700">Name</th>
              <th class="px-4 py-3 text-left text-sm font-semibold text-slate-700">Email</th>
              <th class="px-4 py-3 text-left text-sm font-semibold text-slate-700">Matric No</th>
              <th class="px-4 py-3 text-left text-sm font-semibold text-slate-700">Current Role</th>
              <th class="px-4 py-3 text-left text-sm font-semibold text-slate-700">Update Role</th>
            </tr>
          </thead>
          <tbody>
            {% for member in users %}
              <tr class="border-t border-slate-200">
                <td class="px-4 py-3 text-slate-700">{{ member.full_name }}</td>
                <td class="px-4 py-3 text-slate-700">{{ member.email }}</td>
                <td class="px-4 py-3 text-slate-700">{{ member.matric_number or '-' }}</td>
                <td class="px-4 py-3 text-slate-700 capitalize">{{ member.role }}</td>
                <td class="px-4 py-3 text-slate-700">
                  <form method="POST" action="{{ url_for('main.update_user_role', user_id=member.id) }}" class="flex gap-2">
                    <select name="role" class="border border-slate-300 rounded-lg px-3 py-2">
                      <option value="student" {% if member.role == 'student' %}selected{% endif %}>Student</option>
                      <option value="lecturer" {% if member.role == 'lecturer' %}selected{% endif %}>Lecturer</option>
                      <option value="admin" {% if member.role == 'admin' %}selected{% endif %}>Admin</option>
                    </select>
                    <button type="submit" class="bg-slate-900 text-white px-3 py-2 rounded-lg hover:bg-slate-800">
                      Save
                    </button>
                  </form>
                </td>
              </tr>
            {% endfor %}
          </tbody>
        </table>
      </div>
    </div>
  </div>
</body>
</html>
